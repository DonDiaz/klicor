name: Booking reminders

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: booking-reminders
  cancel-in-progress: false

jobs:
  trigger-reminders:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call booking reminder endpoint
        env:
          BOOKING_REMINDER_URL: ${{ secrets.BOOKING_REMINDER_URL }}
          BOOKING_REMINDER_SECRET: ${{ secrets.BOOKING_REMINDER_SECRET }}
        run: |
          if [ -z "$BOOKING_REMINDER_URL" ] || [ -z "$BOOKING_REMINDER_SECRET" ]; then
            echo "Missing BOOKING_REMINDER_URL or BOOKING_REMINDER_SECRET."
            exit 1
          fi

          curl --fail --silent --show-error \
            --max-time 60 \
            --retry 2 \
            --retry-delay 10 \
            --request POST \
            --header "Authorization: Bearer ${BOOKING_REMINDER_SECRET}" \
            --output /tmp/booking-reminders-response.json \
            "$BOOKING_REMINDER_URL"

          echo "Booking reminder sweep completed."
